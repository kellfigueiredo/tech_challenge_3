apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: auth
type: Opaque
stringData:
  # Ajuste usuário/senha/host ao seu Postgres no namespace auth (ex.: Service postgres)
  # Preencha RDS_* no .env e rode scripts/render-k8s-manifests.sh (envsubst usa ${...}).
  DATABASE_URL: postgres://${__RDS_AUTH_USER__}:${__RDS_AUTH_PASSWORD__}@${__RDS_AUTH_ENDPOINT__}:5432/${__RDS_AUTH_DB__}
  MASTER_KEY: admin-secreto-123
