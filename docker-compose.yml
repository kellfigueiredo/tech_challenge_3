name: all-service

services:
  auth-service:
    container_name: auth-service
    image: auth-service:v1
    hostname: auth-service
    ports:
      - ${AUTH_PORT:?}:8001
    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL:?}
      MASTER_KEY: ${MASTER_KEY:?}
    restart: unless-stopped
    depends_on:
      - auth-flag-db
    networks:
      - services-network
      - databases-network

  evaluation-service:
    container_name: evaluation-service
    image: evaluation-service:v1
    hostname: evaluation-service
    ports:
      - ${EVALUATION_PORT:?}:8004
    environment:
      REDIS_URL: ${REDIS_URL:?}
      FLAG_SERVICE_URL: ${FLAG_SERVICE_URL:?} 
      TARGETING_SERVICE_URL: ${TARGETING_SERVICE_URL:?} 
      SERVICE_API_KEY: ${SERVICE_API_KEY:?}
      # Opcional em dev local (evaluation não envia eventos se vazio)
      AWS_SQS_URL: ${AWS_SQS_URL:-}
      AWS_REGION: ${AWS_REGION:-us-east-1} 
    restart: unless-stopped
    depends_on:
      - redis
      - auth-service
      - flag-service
      - targeting-service
    networks:
      - services-network
      - cache-network

  analytics-service:
    container_name: analytics-service
    image: analytics-service:v1
    hostname: analytics-service
    ports:
      - ${ANALYTICS_PORT:?}:8005
    environment:
      # Para o demo local do PDF, o worker de SQS pode ficar desativado.
      AWS_SQS_URL: ${AWS_SQS_URL:-}
      AWS_DYNAMODB_TABLE: ${AWS_DYNAMODB_TABLE:-ToggleMasterAnalytics}
      AWS_REGION: ${AWS_REGION:-us-east-1}

      # DynamoDB Local (exigido pelo PDF na etapa "docker compose up").
      DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
      DYNAMODB_CREATE_TABLE: "1"
      DYNAMODB_USE_DUMMY_CREDS: "1"
      # Na EC2: exporte credenciais do IMDS (LabRole) antes do docker compose up
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    restart: unless-stopped
    depends_on:
      - dynamodb-local
    networks:
      - services-network

  targeting-service:
    container_name: targeting-service
    image: targeting-service:v1
    hostname: targeting-service
    ports:
      - ${TARGETING_PORT:?}:8003
    environment:
      TARGETING_DATABASE_URL: ${TARGETING_DATABASE_URL:?}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:?}
    restart: unless-stopped
    depends_on:
      - targeting-service-db
      - auth-service
    networks:
      - services-network
      - databases-network

  flag-service:
    container_name: flag-service
    image: flag-service:v1
    hostname: flag-service
    ports:
      - ${FLAG_PORT:?}:8002
    environment:
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:?}
      # Auth + Flag compartilham o mesmo PostgreSQL (PDF exige 2 instancias no total).
      FLAG_DATABASE_URL: ${AUTH_DATABASE_URL:?}
    restart: unless-stopped
    depends_on:
      - auth-flag-db
      - auth-service
    networks:
      - services-network
      - databases-network

  auth-flag-db:
    container_name: auth-flag-db
    image: postgres:16
    hostname: auth-flag-db
    ports:
      - 5432:5432
    volumes:
      - ./auth-service/db/init.sql:/docker-entrypoint-initdb.d/01-auth-init.sql
      - ./flag-service/db/init.sql:/docker-entrypoint-initdb.d/02-flag-init.sql
    environment:
      # Este DB sera usado por auth-service e flag-service (o PDF pede apenas 2 Postgres no compose).
      POSTGRES_DB: ${AUTH_POSTGRES_DB:?}
      POSTGRES_USER: ${AUTH_POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD:?}
      # Para compatibilidade no demo local, evitar autenticação SCRAM.
      # Como é ambiente local, trust é aceitavel para esta etapa.
      POSTGRES_HOST_AUTH_METHOD: trust
    restart: unless-stopped
    networks:
      - databases-network

  targeting-service-db:
    container_name: targeting-service-db
    image: postgres:16 
    hostname: targeting-service-db
    ports:
      - "5433:5432"
    volumes:
      - ./targeting-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: ${TARGETING_POSTGRES_DB:?}
      POSTGRES_USER: ${TARGETING_POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${TARGETING_POSTGRES_PASSWORD:?}
      # Para compatibilidade no demo local, evitar autenticação SCRAM.
      POSTGRES_HOST_AUTH_METHOD: trust
    restart: unless-stopped
    networks:
      - databases-network

  dynamodb-local:
    container_name: dynamodb-local
    image: amazon/dynamodb-local:latest
    hostname: dynamodb-local
    ports:
      - "8006:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    restart: unless-stopped
    networks:
      - services-network

  redis:
    container_name: redis
    image: redis:latest
    hostname: redis
    ports:
      - 6379:6379
    restart: unless-stopped
    networks:
      - cache-network


networks:
  services-network:
    driver: bridge
  databases-network:
    driver: bridge
    internal: true
  cache-network:
    driver: bridge
    internal: true