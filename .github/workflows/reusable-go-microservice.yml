name: Reusable — Go microservice (DevSecOps + ECR + GitOps)

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      ecr_repository:
        required: true
        type: string
      gitops_manifest:
        required: true
        type: string
      aws_region:
        required: false
        type: string
        default: us-east-1

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: ${{ inputs.service_path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Go mod download
        run: go mod download

      - name: Unit tests
        run: go test ./... -count=1

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ inputs.service_path }}
          args: --timeout 5m

      - name: Trivy filesystem (SCA) — falha em CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ inputs.service_path }}
          severity: CRITICAL
          exit-code: "1"
          vuln-type: os,library

      - name: SAST (gosec)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          gosec -severity high ./...

      - name: Docker build
        run: docker build -t "${{ inputs.ecr_repository }}:v1.0.0-${{ github.sha }}" .

      - name: Trivy image scan — falha em CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: "${{ inputs.ecr_repository }}:v1.0.0-${{ github.sha }}"
          severity: CRITICAL
          exit-code: "1"

      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag e push imagem (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: v1.0.0-${{ github.sha }}
        run: |
          docker tag "${{ inputs.ecr_repository }}:${IMAGE_TAG}" "${REGISTRY}/${{ inputs.ecr_repository }}:${IMAGE_TAG}"
          docker push "${REGISTRY}/${{ inputs.ecr_repository }}:${IMAGE_TAG}"

      - name: Instalar yq
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Atualizar imagem no GitOps (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          MANIFEST: ${{ github.workspace }}/${{ inputs.gitops_manifest }}
        run: |
          export IMG="${REGISTRY}/${{ inputs.ecr_repository }}:v1.0.0-${{ github.sha }}"
          yq -i '.spec.template.spec.containers[0].image = strenv(IMG)' "$MANIFEST"
          echo "Nova imagem: $IMG"

      - name: Commit e push GitOps (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            echo "Tentativa $attempt/3"

            git pull

            git add "${{ inputs.gitops_manifest }}"

            if git diff --staged --quiet; then
              echo "Nada a commitar."
              exit 0
            fi

            git commit -m "gitops: bump ${{ inputs.service_name }} para ${{ github.sha }}" || true

            if git push; then
              echo "Push realizado com sucesso."
              exit 0
            fi

            echo "Falha no push. Tentando novamente..."
            
            git reset --soft HEAD~1 || true
            sleep 5
          done

          echo "Falha após 3 tentativas."
          exit 1