name: CI — auth

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "services/auth/**"
      - ".github/workflows/ci-auth.yml"
      - ".github/workflows/reusable-go-microservice.yml"
      - ".golangci.yml"
      - "docker-compose.yml"
      - "Makefile"
  pull_request:
    paths:
      - "services/auth/**"
      - ".github/workflows/ci-auth.yml"
      - ".github/workflows/reusable-go-microservice.yml"
      - ".golangci.yml"
      - "docker-compose.yml"
      - "Makefile"

jobs:
  pipeline:
    permissions:
      contents: write
    uses: ./.github/workflows/reusable-go-microservice.yml
    secrets: inherit
    with:
      service_name: auth
      service_path: services/auth
      ecr_repository: togglemaster-auth
      gitops_manifest: gitops/apps/auth/deployment.yaml
