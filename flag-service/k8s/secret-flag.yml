apiVersion: v1
kind: Secret
metadata:
  name: flag-secret
  namespace: flag
type: Opaque
stringData:
  # Ajuste host ao Service Postgres da flag (ex.: postgres-flag.flag.svc.cluster.local)
  # Preencha RDS_* no .env e rode scripts/render-k8s-manifests.sh.
  FLAG_DATABASE_URL: postgres://${__RDS_FLAG_USER__}:${__RDS_FLAG_PASSWORD__}@${__RDS_FLAG_ENDPOINT__}:5432/${__RDS_FLAG_DB__}
