apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag
  namespace: togglemaster
  labels:
    app.kubernetes.io/name: flag
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flag
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flag
    spec:
      containers:
        - name: flag
          image: 633853515534.dkr.ecr.us-east-1.amazonaws.com/togglemaster-flag:v1.0.0-01422d2f975d4eaa658d51ff3ae93d5ca6acd00a
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
