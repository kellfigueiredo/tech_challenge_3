name: CI/CD — Terraform

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "gitops/argocd/**"
      - ".github/workflows/ci-terraform.yml"
  pull_request:
    paths:
      - "terraform/**"
      - "gitops/argocd/**"
      - ".github/workflows/ci-terraform.yml"

env:
  TF_DIR: terraform
  AWS_REGION: us-east-1

jobs:
  plan:
    name: Terraform Plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          cat > backend.hcl << 'EOF'
          bucket  = "terraformbucket-fiap-ch3"
          key     = "togglemaster/fase3/terraform.tfstate"
          region  = "us-east-1"
          encrypt = true
          EOF
          terraform init -backend-config=backend.hcl

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" -no-color -out=tfplan
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const output = `#### Terraform Plan 📋
            \`\`\`
            Plan output available in the workflow logs.
            \`\`\`
            *Pushed by: @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  apply:
    name: Terraform Apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          cat > backend.hcl << 'EOF'
          bucket  = "terraformbucket-fiap-ch3"
          key     = "togglemaster/fase3/terraform.tfstate"
          region  = "us-east-1"
          encrypt = true
          EOF
          terraform init -backend-config=backend.hcl

      - name: "Fase 1 — VPC, EKS e Security Groups"
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply \
            -target=module.vpc \
            -target=module.eks \
            -target=module.security_groups \
            -target=module.ecr \
            -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" \
            -auto-approve

      - name: "Fase 2 — Apply completo (RDS, ElastiCache, DynamoDB, SQS, ArgoCD)"
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply \
            -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" \
            -auto-approve

      - name: Configurar kubectl
        run: |
          aws eks update-kubeconfig --name togglemaster-dev-eks --region ${{ env.AWS_REGION }}

      - name: Aplicar ArgoCD Applications
        run: |
          kubectl apply -f gitops/argocd/
