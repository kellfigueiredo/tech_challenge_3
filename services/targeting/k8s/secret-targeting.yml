apiVersion: v1
kind: Secret
metadata:
  name: targeting-secret
  namespace: targeting
type: Opaque
stringData:
  # Ajuste host ao Service Postgres do targeting
  # Preencha RDS_* no .env e rode scripts/render-k8s-manifests.sh.
  TARGETING_DATABASE_URL: postgres://${__RDS_TARGETING_USER__}:${__RDS_TARGETING_PASSWORD__}@${__RDS_TARGETING_ENDPOINT__}:5432/${__RDS_TARGETING_DB__}
